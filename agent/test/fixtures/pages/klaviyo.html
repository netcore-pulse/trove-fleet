<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Klaviyo Embed Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    header, main, footer { padding: 24px; }
    footer { background: #111; color: #eee; }
    .cc-banner {
      position: fixed; bottom: 0; left: 0; right: 0; background: #222; color: #fff;
      padding: 16px; display: flex; gap: 12px; align-items: center; z-index: 9999;
    }
    .klaviyo-form { border: 1px solid #444; padding: 16px; max-width: 420px; }
    input { padding: 8px; font-size: 16px; width: 220px; }
    button { padding: 8px 14px; font-size: 16px; }
  </style>
</head>
<body>
  <!-- Cookie consent overlay: MUST be dismissed before interacting. -->
  <div id="cookie-consent-banner" class="cc-banner" role="region" aria-label="cookie consent">
    <span>We use cookies to improve your experience.</span>
    <button type="button" id="cc-accept">Accept All</button>
    <button type="button" id="cc-reject">Reject</button>
  </div>

  <header>
    <h1>Brand</h1>
    <!-- Search decoy in the header. Must NOT be chosen. -->
    <form role="search" class="site-search" action="/search">
      <input type="search" name="q" placeholder="Search products" aria-label="Search" />
      <button type="submit">Search</button>
    </form>
  </header>

  <main>
    <h2>Shop the new collection</h2>
  </main>

  <footer>
    <!-- Klaviyo embedded newsletter form (real Klaviyo embed signatures). -->
    <div class="klaviyo-form-Vn3xyz klaviyo-form view-50 kl-private-reset-css-Xuajs1">
      <form class="klaviyo-form" novalidate="">
        <h3>Get 10% off your first order</h3>
        <div class="kl_inputContainer">
          <input
            type="email"
            name="email"
            class="kl_field needsclick go2421913488"
            id="email_kl_Vn3xyz"
            placeholder="Email"
            autocomplete="email"
            aria-label="Email"
          />
        </div>
        <button type="submit" class="kl_submit go2421913489">Subscribe</button>
      </form>
    </div>
  </footer>

  <script>
    document.getElementById('cc-accept').addEventListener('click', function () {
      document.getElementById('cookie-consent-banner').remove();
    });
    // Submit handler: show the double-opt-in "check your email" success copy.
    document.querySelector('form.klaviyo-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.querySelector("input[type='email']").value || '';
      if (!/.+@.+\..+/.test(email)) {
        document.body.insertAdjacentHTML('beforeend',
          '<div role="alert" class="error">Please enter a valid email address.</div>');
        return;
      }
      this.outerHTML = '<p class="kl-success">Almost there! Please confirm your subscription — check your email.</p>';
    });
  </script>
</body>
</html>
