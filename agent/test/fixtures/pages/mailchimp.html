<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mailchimp Embed Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    header, main, footer { padding: 24px; }
    footer { background: #f3f3f3; }
    #mc_embed_signup { border: 1px solid #ccc; padding: 16px; max-width: 480px; }
    input { padding: 8px; font-size: 16px; }
    /* Mailchimp's classic honeypot: visually hidden + offscreen. */
    .mc-hp { position: absolute; left: -5000px; }
    .mce_inline_error { color: #b00; }
  </style>
</head>
<body>
  <header>
    <h1>Brand</h1>
    <nav>
      <!-- Account login decoy (email + password). Must NOT be chosen. -->
      <form id="login" action="/account/login" method="post">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="customer[email]" autocomplete="username" />
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" name="customer[password]" autocomplete="current-password" />
        <button type="submit">Sign in</button>
      </form>
    </nav>
  </header>

  <main><h2>Latest drops</h2></main>

  <footer>
    <!-- Mailchimp embedded form (real mc_embed signatures + list-manage action). -->
    <div id="mc_embed_signup" class="mc4wp-form">
      <form
        action="https://brand.us1.list-manage.com/subscribe/post?u=abc123&id=def456"
        method="post"
        id="mc-embedded-subscribe-form"
        name="mc-embedded-subscribe-form"
        class="validate"
        novalidate
      >
        <h3>Join our newsletter</h3>
        <div id="mc_embed_signup_scroll">
          <div class="mc-field-group">
            <label for="mce-EMAIL">Email Address</label>
            <input
              type="email"
              name="EMAIL"
              class="required email"
              id="mce-EMAIL"
              placeholder="you@example.com"
            />
          </div>
          <div class="mc-field-group">
            <label for="mce-FNAME">First Name</label>
            <input type="text" name="FNAME" class="" id="mce-FNAME" />
          </div>
          <!-- Honeypot: real Mailchimp bot-field. Must NOT be filled. -->
          <div class="mc-hp" aria-hidden="true">
            <input type="text" name="b_abc123_def456" tabindex="-1" value="" id="b_honeypot" />
          </div>
          <div class="clear">
            <input type="submit" value="Subscribe" name="subscribe" id="mc-embedded-subscribe" class="button" />
          </div>
        </div>
      </form>
    </div>
  </footer>

  <script>
    document.getElementById('login').addEventListener('submit', function (e) { e.preventDefault(); });
    document.getElementById('mc-embedded-subscribe-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('mce-EMAIL').value || '';
      if (!/.+@.+\..+/.test(email)) {
        var err = document.createElement('div');
        err.className = 'mce_inline_error';
        err.setAttribute('role', 'alert');
        err.textContent = 'Please enter a valid email address.';
        document.getElementById('mc-embedded-subscribe-form').appendChild(err);
        return;
      }
      this.innerHTML = '<p>Thanks for subscribing! Please check your email to confirm your subscription.</p>';
    });
  </script>
</body>
</html>
