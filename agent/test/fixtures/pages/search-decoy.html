<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Search Decoy Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
    input { padding: 8px; font-size: 16px; width: 280px; }
  </style>
</head>
<body>
  <h1>Brand</h1>
  <!-- ONLY a site-search box on the page. No newsletter signup anywhere.
       A naive "find an input near a button" matcher would grab it; the finder
       must reject it (looks-like-search) and report no_form_found.
       Note: the input is type=text (not type=search) on purpose, so rejection
       relies on the search-intent heuristics, not just the type. -->
  <form role="search" action="/search" class="site-search">
    <input
      type="text"
      name="search_query"
      id="site-search-input"
      placeholder="Search for products"
      aria-label="Search the store"
    />
    <button type="submit">Search</button>
  </form>

  <script>
    document.querySelector('form.site-search').addEventListener('submit', function (e) { e.preventDefault(); });
  </script>
</body>
</html>
