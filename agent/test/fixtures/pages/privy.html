<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Privy Modal Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    header, main { padding: 24px; }
    .privy-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9000;
      display: flex; align-items: center; justify-content: center;
    }
    .privy-popup {
      background: #fff; padding: 28px; max-width: 440px; border-radius: 8px; position: relative;
    }
    .privy-close { position: absolute; top: 8px; right: 12px; border: none; background: none; font-size: 22px; cursor: pointer; }
    input { padding: 8px; font-size: 16px; width: 240px; }
    button[type="submit"] { padding: 8px 14px; font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Brand</h1>
    <!-- A login form ELSEWHERE on the page (email + password). Must NOT be chosen. -->
    <form action="/login">
      <input type="email" name="email" placeholder="Email" autocomplete="username" />
      <input type="password" name="password" placeholder="Password" />
      <button type="submit">Log in</button>
    </form>
  </header>

  <main><h2>Welcome</h2></main>

  <!-- Privy popup modal newsletter signup (real Privy widget signatures). -->
  <div class="privy-modal-backdrop" id="privy-overlay" role="dialog" aria-modal="true" aria-label="signup">
    <div class="privy-popup privy-widget-container" data-privy-campaign="welcome-15">
      <button type="button" class="privy-close" aria-label="Close">×</button>
      <form class="privy-form" id="privy-form-15">
        <h3>Unlock 15% off</h3>
        <p>Join our list — be the first to know about new arrivals.</p>
        <input
          type="email"
          name="email"
          class="privy-field-input"
          id="privy-email"
          placeholder="Enter your email address"
          aria-label="Email address"
        />
        <button type="submit" class="privy-button">Subscribe</button>
      </form>
    </div>
  </div>

  <script>
    document.querySelector('.privy-close').addEventListener('click', function () {
      // In the real widget, close hides the popup; here we keep the form present
      // for the finder by only hiding on explicit close (the loop does not click it).
      document.getElementById('privy-overlay').style.display = 'none';
    });
    document.querySelector('form.privy-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.querySelector("input[type='email']").value || '';
      if (!/.+@.+\..+/.test(email)) {
        this.insertAdjacentHTML('beforeend', '<span role="alert" class="error">Please enter a valid email.</span>');
        return;
      }
      this.outerHTML = '<p>Thanks for signing up! Check your inbox to confirm your subscription.</p>';
    });
  </script>
</body>
</html>
