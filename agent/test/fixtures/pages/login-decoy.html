<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Login Decoy Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
    input { padding: 8px; font-size: 16px; display: block; margin: 6px 0; width: 240px; }
  </style>
</head>
<body>
  <h1>Sign in to your account</h1>
  <!-- ONLY a login form on the page (email + password). There is NO newsletter
       signup anywhere. The finder must reject this and report no_form_found. -->
  <form id="login" action="/account/login" method="post">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="username" placeholder="Email" />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Password" />
    <button type="submit">Log in</button>
    <a href="/forgot">Forgot your password?</a>
  </form>

  <script>
    document.getElementById('login').addEventListener('submit', function (e) { e.preventDefault(); });
  </script>
</body>
</html>
