<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Generic Footer Newsletter Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    header, main, footer { padding: 24px; }
    footer { background: #1a1a1a; color: #eee; }
    .newsletter { max-width: 460px; }
    input { padding: 8px; font-size: 16px; width: 240px; }
    button { padding: 8px 14px; font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Brand</h1>
    <!-- Search decoy in the header. Must NOT be chosen. -->
    <form action="/search" class="header-search">
      <input type="text" name="query" placeholder="Search" aria-label="Search the site" />
      <button type="submit">Go</button>
    </form>
  </header>

  <main>
    <h2>Our story</h2>
    <p>Hand-made goods since 2014.</p>
  </main>

  <footer>
    <div class="footer-cols">
      <div>
        <h4>Shop</h4>
        <a href="/new">New</a> · <a href="/sale">Sale</a>
      </div>
      <!-- Plain DIY footer newsletter signup (no ESP). Must be chosen. -->
      <div class="newsletter">
        <h4>Newsletter</h4>
        <p>Subscribe for updates and exclusive offers.</p>
        <form action="/newsletter/subscribe" method="post" class="newsletter-form">
          <label for="nl-email">Email address</label>
          <input type="email" id="nl-email" name="email" placeholder="you@example.com" autocomplete="email" />
          <button type="submit">Subscribe</button>
        </form>
      </div>
    </div>
  </footer>

  <script>
    document.querySelector('.header-search').addEventListener('submit', function (e) { e.preventDefault(); });
    document.querySelector('.newsletter-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.querySelector("input[type='email']").value || '';
      if (!/.+@.+\..+/.test(email)) {
        this.insertAdjacentHTML('beforeend', '<p role="alert" class="error">Please enter a valid email address.</p>');
        return;
      }
      this.outerHTML = '<p>Thank you for subscribing! Please check your email to confirm.</p>';
    });
  </script>
</body>
</html>
