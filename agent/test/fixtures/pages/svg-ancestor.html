<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SVG-ancestor newsletter fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    input { padding: 8px; font-size: 16px; width: 240px; }
    button { padding: 8px 14px; font-size: 16px; }
  </style>
</head>
<body>
  <header><h1>Brand</h1></header>

  <main>
    <h2>Join the newsletter</h2>
    <!--
      Regression guard: the newsletter <input> sits inside an inline SVG
      (via <foreignObject>), so its ancestor chain includes SVG elements whose
      `.className` is an SVGAnimatedString, NOT a string. extractCandidates walks
      that chain and called lc(node.className) — which threw on the non-string,
      got swallowed by the caller's catch, and dead-ended the store at
      no_form_found. This fixture must resolve to `submitted`.
    -->
    <svg viewBox="0 0 420 120" width="420" height="120" xmlns="http://www.w3.org/2000/svg">
      <foreignObject x="0" y="0" width="420" height="120">
        <form xmlns="http://www.w3.org/1999/xhtml" class="newsletter-signup" novalidate="">
          <label>
            Email
            <input type="email" name="email" placeholder="Enter your email" autocomplete="email" aria-label="Email" />
          </label>
          <button type="submit">Subscribe</button>
        </form>
      </foreignObject>
    </svg>
  </main>

  <footer><p>© Brand.</p></footer>

  <script>
    document.querySelector('form.newsletter-signup').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.querySelector("input[type='email']").value || '';
      if (!/.+@.+\..+/.test(email)) {
        document.body.insertAdjacentHTML('beforeend',
          '<div role="alert" class="error">Please enter a valid email address.</div>');
        return;
      }
      this.outerHTML = '<p class="ok">Almost there! Please confirm your subscription — check your email.</p>';
    });
  </script>
</body>
</html>
