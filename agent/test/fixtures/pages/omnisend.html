<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Omnisend Embed Fixture — Brand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; }
    header, main, footer { padding: 24px; }
    footer { background: #fafafa; }
    .omnisend-form { border: 1px solid #ddd; padding: 16px; max-width: 460px; }
    input { padding: 8px; font-size: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>Brand</h1>
    <!-- Search decoy. Must NOT be chosen. -->
    <input type="search" name="search" placeholder="Search the store" aria-label="Search the store" />
  </header>

  <main><h2>Featured</h2></main>

  <footer>
    <!-- Omnisend embedded signup form (real omnisend signatures). -->
    <div class="omnisend-form-wrapper" data-omnisend-form="footer-signup">
      <form class="omnisend-form omnisend-snippet" id="omnisend-embed-1">
        <h3>Subscribe and save</h3>
        <p>Sign up for our newsletter and get the latest offers.</p>
        <input
          type="email"
          name="email"
          class="omnisend-input"
          id="omnisend-email"
          placeholder="Enter your email"
          autocomplete="email"
          aria-label="Email"
        />
        <button type="submit" class="omnisend-button">Sign Up</button>
      </form>
    </div>
  </footer>

  <script>
    document.querySelector('form.omnisend-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.querySelector("input[type='email']").value || '';
      if (!/.+@.+\..+/.test(email)) {
        this.insertAdjacentHTML('beforeend', '<span role="alert" class="error">Invalid email.</span>');
        return;
      }
      this.outerHTML = '<p>You\'re almost subscribed — we\'ve sent you a confirmation email. Please confirm your subscription.</p>';
    });
  </script>
</body>
</html>
