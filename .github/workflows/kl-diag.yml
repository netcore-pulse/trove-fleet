name: kl-diag

# Read-only diagnostic: does Klaviyo populate its onsite form registry from a GHA
# datacenter IP? Loads a few Klaviyo storefronts headless and prints the registry
# timeline. Does NOT subscribe to anything. Owner-triggered.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - run: npm ci
        working-directory: agent
      - run: npx playwright install --with-deps chromium
        working-directory: agent
      - name: Show egress IP + ASN
        run: curl -s https://ipinfo.io/json | head -20 || true
      - name: Probe Klaviyo registry from this runner
        working-directory: agent
        run: node --experimental-strip-types ../kl-diag.mjs
